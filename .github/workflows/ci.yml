name: Build Astro-xwnav

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    if: "!contains(github.event.head_commit.message, '[skip icons]')"

    steps:
    - uses: actions/checkout@v4

    - uses: actions/setup-node@v4
      with: { node-version: 20 }

    - uses: pnpm/action-setup@v2
      with: { version: 9, cache: true }

    - run: pnpm install --frozen-lockfile

    - name: 🚚 Run icon generator
      id: icon
      run: |
        pnpm dlx tsx icon-system/0icon.ts
        if ! git diff --quiet; then echo "changed=true" >> $GITHUB_OUTPUT; fi

    - name: 📝 Commit icon & data
      if: steps.icon.outputs.changed == 'true'
      uses: EndBug/add-and-commit@v9
      with:
        add: |
          src/data/navLinks.js
          public/icons/**
        force: true
        message: 'chore: auto add icons [skip icons]'
        default_author: github_actions
        push: true

    - name: 🛠 Build Astro site
      run: pnpm build

    - uses: actions/upload-artifact@v4
      with:
        name: dist-${{ github.sha }}
        path: dist
        retention-days: 14
