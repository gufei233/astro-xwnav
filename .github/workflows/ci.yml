# .github/workflows/ci.yml
name: Build Astro-xwnav

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write        # 允许自动提交

jobs:
  build:
    runs-on: ubuntu-latest

    # 跳过脚本自己的 [skip icons] 提交
    if: "!contains(github.event.head_commit.message, '[skip icons]')"

    steps:
    # ① Checkout
    - uses: actions/checkout@v4

    # ② Node & pnpm
    - uses: actions/setup-node@v4
      with:
        node-version: 20
    - uses: pnpm/action-setup@v2
      with:
        version: 9
        cache: true

    # ③ Install deps
    - run: pnpm install --frozen-lockfile

    # ④ 🚚 运行图标脚本
    - name: Run icon generator
      id: icon
      run: |
        pnpm dlx tsx icon-system/0icon.ts
        # 若任意文件被修改，则输出 changed=true
        if ! git diff --quiet; then
          echo "changed=true" >> $GITHUB_OUTPUT
        fi

    # ⑤ 📝 如有变动 → commit (图标文件 + navLinks.js)
    - name: Commit icon changes
      if: steps.icon.outputs.changed == 'true'
      uses: EndBug/add-and-commit@v9
      with:
        add: .
        message: 'chore: auto add icons [skip icons]'
        default_author: github_actions
        push: true                     # 推回 main

    # ⑥ 🛠 Build
    - name: Build Astro site
      run: pnpm build

    # ⑦ 📦 Upload single-zip artifact
    - uses: actions/upload-artifact@v4
      with:
        name: dist-${{ github.sha }}
        path: dist
        retention-days: 14
