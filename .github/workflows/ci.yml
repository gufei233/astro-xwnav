name: Build Astro-xwnav

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write          # 允许自动提交

jobs:
  build:
    runs-on: ubuntu-latest
    if: "!contains(github.event.head_commit.message, '[skip icons]')"  # 跳过自己

    steps:
    # ① Checkout
    - uses: actions/checkout@v4

    # ② Node & pnpm
    - uses: actions/setup-node@v4
      with: { node-version: 20 }
    - uses: pnpm/action-setup@v2
      with: { version: 9, cache: true }

    # ③ 安装依赖
    - run: pnpm install --frozen-lockfile

    # ④ 运行图标脚本
    - name: Run icon generator
      id: icons
      run: |
        pnpm dlx tsx icon-system/0icon.ts
        if ! git diff --quiet; then echo "changed=true" >> $GITHUB_OUTPUT; fi

    # ⑤ 有变更 → 强制添加 public/icons + navLinks.js → 提交
    - name: Commit icon & data changes
      if: steps.icons.outputs.changed == 'true'
      run: |
        git config user.name  "github-actions"
        git config user.email "github-actions@github.com"

        # 强制追踪被 .gitignore 排掉的图标文件
        git add -f public/icons/**
        git add src/data/navLinks.js

        # 若仍有其他变更也一起提交
        git commit -m "chore: auto add icons [skip icons]" || echo "Nothing to commit"
        git push
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}   # checkout 已带，不需额外 PAT

    # ⑥ 构建
    - name: Build Astro site
      run: pnpm build

    # ⑦ 上传单层 ZIP Artifact
    - uses: actions/upload-artifact@v4
      with:
        name: dist-${{ github.sha }}
        path: dist
        retention-days: 14
